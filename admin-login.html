<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login privado | Los Gallitos Bakery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="login-shell">
    <form class="login-card" data-login-form>
      <p class="admin-kicker">Acceso privado</p>
      <h1>Consola premium</h1>
      <p>Ingresa la contrasena del panel para administrar portada, productos, fotos y colores.</p>
      <label>
        Contrasena
        <input type="password" data-login-password placeholder="Escribe la contrasena del panel">
      </label>
      <button class="button button-primary" type="submit">Entrar al panel</button>
      <p class="status-text" data-login-status>Esperando autenticacion.</p>
    </form>
  </div>

  <script src="admin-login.js"></script>
</body>
</html>
