<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Los Gallitos Bakery</title>
  <meta
    name="description"
    content="Menu de Los Gallitos Bakery con pan dulce, antojos salados, bebidas y favoritos."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link id="site-favicon" rel="icon" href="./assets/favicon.jpg" type="image/jpeg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">
          <img class="brand-logo-image hidden" data-logo-image alt="Logo de Los Gallitos Bakery">
          <span class="brand-logo-fallback">LG</span>
        </span>
        <span class="brand-text">
          <strong data-edit="brandName">Los Gallitos Bakery</strong>
        </span>
      </a>

      <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
        Menu
      </button>

      <nav class="site-nav" id="site-nav">
        <a href="./index.html">Inicio</a>
        <a class="is-active" href="./menu.html">Menu</a>
      </nav>
    </header>

    <main>
      <section class="menu-section">
        <div class="section-heading section-heading-left">
          <div>
            <h2>Menu</h2>
          </div>
        </div>
        <div class="menu-grid" data-menu-grid></div>
      </section>

      <section class="selection-section">
        <div class="section-heading section-heading-left">
          <div>
            <h2>Favoritos</h2>
          </div>
        </div>
        <div class="product-grid" data-product-grid></div>
      </section>

      <section class="contact-hub" id="contacto">
        <div class="contact-hub-grid">
          <article class="contact-story">
            <h2 class="contact-title" data-edit="contactTitle">Listos para tomar tu pedido</h2>
          </article>
          <article class="contact-panel">
            <div class="contact-lines">
              <div class="contact-line">
                <span class="contact-line-icon" aria-hidden="true">⌂</span>
                <a class="contact-value contact-link" data-map-link href="#" target="_blank" rel="noreferrer noopener" data-edit="locationText">123 Calle Principal, tu ciudad</a>
              </div>
              <div class="contact-line">
                <span class="contact-line-icon" aria-hidden="true">◷</span>
                <p class="contact-value" data-edit="scheduleText">Lunes a Sabado: 7:00 AM - 7:00 PM</p>
              </div>
              <div class="contact-line">
                <span class="contact-line-icon" aria-hidden="true">✆</span>
                <a class="contact-value contact-link" data-phone-link href="#" data-edit="phoneText">(555) 123-4567</a>
              </div>
            </div>
            <div class="social-links" data-social-links></div>
            <a class="doordash-link is-disabled" data-doordash-link href="#" target="_blank" rel="noreferrer noopener" aria-disabled="true">
              <span class="doordash-logo-wrap">
                <img class="doordash-logo hidden" data-doordash-logo alt="Logo de DoorDash">
                <span class="doordash-logo-fallback">DD</span>
              </span>
              <span class="doordash-copy-inline">
                <span class="contact-label" data-edit="deliveryLabel">Ordena online</span>
                <span class="doordash-text" data-edit="deliveryHeading">Pide por DoorDash</span>
              </span>
            </a>
          </article>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p><span data-edit="footerText">Los Gallitos Bakery</span> <span id="year"></span>.</p>
    </footer>
  </div>

  <a
    class="whatsapp-float is-disabled"
    data-whatsapp-link
    href="#"
    target="_blank"
    rel="noreferrer noopener"
    aria-label="Enviar mensaje por WhatsApp"
    aria-disabled="true"
  >
    <span class="whatsapp-float-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" role="img" focusable="false">
        <path fill="currentColor" d="M19.05 4.94A9.77 9.77 0 0 0 12.09 2C6.71 2 2.33 6.37 2.33 11.75c0 1.72.45 3.39 1.31 4.86L2.25 22l5.53-1.45a9.7 9.7 0 0 0 4.3 1.03h.01c5.38 0 9.76-4.38 9.76-9.76 0-2.61-1.02-5.06-2.8-6.88Zm-6.96 14.99h-.01a8.1 8.1 0 0 1-4.13-1.13l-.3-.18-3.28.86.88-3.2-.2-.33a8.1 8.1 0 0 1-1.24-4.21c0-4.48 3.65-8.13 8.14-8.13 2.17 0 4.21.84 5.74 2.38a8.07 8.07 0 0 1 2.37 5.76c0 4.49-3.65 8.18-8.13 8.18Zm4.46-6.1c-.24-.12-1.43-.71-1.65-.79-.22-.08-.38-.12-.54.12-.16.24-.62.79-.76.95-.14.16-.28.18-.52.06-.24-.12-1.02-.38-1.95-1.2-.72-.65-1.21-1.45-1.35-1.69-.14-.24-.02-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.31-.74-1.79-.2-.48-.4-.42-.54-.43h-.46c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2s.86 2.32.98 2.48c.12.16 1.69 2.58 4.1 3.62.57.24 1.02.39 1.37.5.58.18 1.11.16 1.53.1.47-.07 1.43-.58 1.63-1.13.2-.55.2-1.02.14-1.13-.06-.11-.22-.18-.46-.3Z"/>
      </svg>
    </span>
    <span class="whatsapp-float-label">WhatsApp</span>
  </a>

  <script src="script.js"></script>
</body>
</html>
